<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BugDrop Annotation Small Wide Fixture</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 140px 80px;
      background: #f5f5f5;
      color: #525252;
      font-family: Arial, sans-serif;
    }

    .field-label {
      display: inline-block;
      width: 252px;
      height: 54px;
      padding: 9px 14px;
      background: #ffffff;
      border: 1px solid #d4d4d4;
      font-size: 28px;
      line-height: 34px;
    }
  </style>
</head>
<body>
  <div id="small-wide-target" class="field-label">Settlement Stage</div>

  <script src="/test/load-widget.js"></script>
  <script>
    window.loadBugDropTestWidget({
      id: 'bugdrop-script',
      dataset: {
        theme: 'dark',
        color: '#ff9e64',
      },
    });
  </script>
</body>
</html>
