name = "gitaigo-bugdrop"
main = "src/index.ts"
compatibility_date = "2024-01-29"
workers_dev = true
account_id = "b02ae19d18b201b3d91ae9f017338555"

# Custom domain: wrangler provisions the DNS record + TLS cert automatically.
routes = [
  { pattern = "bugdrop.gitaigo.it", custom_domain = true },
]

# Static assets directory (for widget.js)
[assets]
directory = "public"
binding = "ASSETS"

# Environment variables
[vars]
ENVIRONMENT = "production"
# Origins of the gitaigo frontend that may call this worker (no "*" in production)
ALLOWED_ORIGINS = "https://app.gitaigo.it,https://staging.gitaigo.it,https://gitaigo.it,https://gitaigo.test,https://gitaigo.test:3001,https://localhost:3001,http://localhost:3001,http://localhost:3000"
GITHUB_APP_NAME = "gitaigo-bugdrop"
MAX_SCREENSHOT_SIZE_MB = "5"

# Rate limiting is OFF: no RATE_LIMIT KV binding → middleware calls next() (see
# src/middleware/rateLimit.ts). The widget is auth-gated in the host app, so spam
# risk is low. To enable later: create a KV namespace in this account and add a
# [[kv_namespaces]] block binding RATE_LIMIT.

# Secrets (set with wrangler secret put — NOT stored here):
#   GITHUB_APP_ID
#   GITHUB_PRIVATE_KEY   (decode from Keychain hex: security ... -w | xxd -r -p)
