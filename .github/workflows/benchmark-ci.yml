name: Benchmark CI

on:
  pull_request:
    paths:
      - 'benchmarks/**'

jobs:
  lint:
    name: Lint Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint benchmark files
        run: npx eslint benchmarks/
